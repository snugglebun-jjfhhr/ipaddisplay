name: ios-build

# Cloud-Mac build path: a macOS runner compiles the iPad app and uploads an
# UNSIGNED .ipa. Download it on Windows and install with Sideloadly, which signs
# with your Apple ID at install time. No Apple certs/secrets live in CI.
#
# NOTE: macOS runner minutes are free for PUBLIC repos and bill at 10x for
# private ones. Keep this repo public, or expect to pay for minutes.

on:
  push:
    branches: [main, master]
    paths: ["ios/**", ".github/workflows/ios-build.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15   # Xcode 16+, reads the project format XcodeGen emits
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build (unsigned)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project IpadDisplay.xcodeproj \
            -scheme IpadDisplay \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned .ipa
        working-directory: ios
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -1)
          echo "App bundle: $APP"
          rm -rf Payload IpadDisplay-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qr IpadDisplay-unsigned.ipa Payload
          ls -la IpadDisplay-unsigned.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: IpadDisplay-unsigned-ipa
          path: ios/IpadDisplay-unsigned.ipa
          if-no-files-found: error
